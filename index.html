<!DOCTYPE html>
<html>
<head>
  <title>Gold AI Dashboard</title>
  <style>
    body {
      background:#0f172a;
      color:white;
      font-family:sans-serif;
      padding:40px;
    }
    .grid {
      display:flex;
      gap:20px;
      flex-wrap:wrap;
    }
    .card {
      background:#1e293b;
      padding:20px;
      border-radius:12px;
      width:300px;
    }
    .bullish { color:#22c55e; }
    .bearish { color:#ef4444; }
    .bar {
      height:8px;
      background:#334155;
      border-radius:5px;
      margin:10px 0;
    }
    .fill {
      height:100%;
      background:#22c55e;
      border-radius:5px;
    }
  </style>
</head>
<body>

<h1>📊 AI Macro Dashboard</h1>

<div class="grid">
  <div class="card">
    <h2>GOLD (XAUUSD)</h2>
    <h3 id="signal">Loading...</h3>
    <div class="bar"><div id="confidence" class="fill" style="width:50%"></div></div>
    <p id="analysis"></p>
  </div>
</div>

<script>
async function loadData() {
  const res = await fetch("/api/analyze");
  const data = await res.json();

  document.getElementById("analysis").innerText = data.analysis;

  if (data.direction === "Bullish") {
    document.getElementById("signal").innerHTML = "<span class='bullish'>Bullish</span>";
  } else {
    document.getElementById("signal").innerHTML = "<span class='bearish'>Bearish</span>";
  }

  document.getElementById("confidence").style.width = data.confidence + "%";
}

loadData();
</script>

</body>
</html>
